name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Cargo build output
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

  check:
    name: check (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
            experimental: false
          - os: macos-latest
            label: macos (untested)
            experimental: true
          - os: ubuntu-latest
            label: linux (untested)
            experimental: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo build output
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev

      - name: Check build
        run: cargo check --locked
