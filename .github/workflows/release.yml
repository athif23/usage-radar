name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: release (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            binary: usage-radar.exe
            helper_binary: chatgpt_billing_probe.exe
            archive: zip
          - os: macos-latest
            label: macos-arm64
            binary: usage-radar
            helper_binary: chatgpt_billing_probe
            archive: tar.gz
          - os: ubuntu-latest
            label: linux-x64
            binary: usage-radar
            helper_binary: chatgpt_billing_probe
            archive: tar.gz

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo build output
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev libxdo-dev

      - name: Build release binary
        run: cargo build --release --locked --bins

      - name: Name artifact
        id: artifact
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $suffix = "${{ github.ref_name }}"
          } else {
            $suffix = "manual-${{ github.run_number }}"
          }

          $artifactName = "usage-radar-$suffix-${{ matrix.label }}"
          "name=$artifactName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Stage release files
        shell: pwsh
        run: |
          $artifactName = "${{ steps.artifact.outputs.name }}"
          $stage = Join-Path $PWD $artifactName

          if (Test-Path $stage) {
            Remove-Item $stage -Recurse -Force
          }

          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "target/release/${{ matrix.binary }}" $stage
          Copy-Item "target/release/${{ matrix.helper_binary }}" $stage
          Copy-Item README.md $stage
          Copy-Item LICENSE $stage

      - name: Package zip archive
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $artifactName = "${{ steps.artifact.outputs.name }}"
          $archive = Join-Path $PWD "$artifactName.zip"
          $checksum = Join-Path $PWD "$artifactName.zip.sha256"

          if (Test-Path $archive) {
            Remove-Item $archive -Force
          }

          if (Test-Path $checksum) {
            Remove-Item $checksum -Force
          }

          Compress-Archive -Path "$artifactName/*" -DestinationPath $archive -Force

          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLower()
          "$hash *$artifactName.zip" | Out-File -FilePath $checksum -Encoding ascii

      - name: Package tar archive
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          artifact_name="${{ steps.artifact.outputs.name }}"
          tar -czf "$artifact_name.tar.gz" "$artifact_name"
          shasum -a 256 "$artifact_name.tar.gz" > "$artifact_name.tar.gz.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: |
            ${{ steps.artifact.outputs.name }}.${{ matrix.archive }}
            ${{ steps.artifact.outputs.name }}.${{ matrix.archive }}.sha256

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.artifact.outputs.name }}.${{ matrix.archive }}
            ${{ steps.artifact.outputs.name }}.${{ matrix.archive }}.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
